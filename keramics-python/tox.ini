[tox]
envlist = py3{10,11,12,13,14}

[testenv]
usedevelop = True
pip_pre = True
passenv =
    CARGO_TARGET_DIR
    CARGO_INCREMENTAL
    RUSTFLAGS
deps =
    build
    maturin ~= 1.0.0
    pip >= 21.3
    pytest >= 3.5.0
commands =
    python -m build --no-isolation --outdir=dist --wheel
    python -m pip install --no-index --find-links=dist pykeramics
    pytest
